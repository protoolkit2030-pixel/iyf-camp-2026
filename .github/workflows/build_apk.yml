name: 🏗️ Build IYF Camp 2026 APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: 🔑 Restore credentials Google Sheets
        run: |
          mkdir -p app/src/main/assets
          echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" | base64 --decode > app/src/main/assets/credentials.json
          echo "✅ credentials.json restauré ($(wc -c < app/src/main/assets/credentials.json) octets)"

      - name: 🔤 Download Poppins fonts
        run: |
          FONT_DIR="app/src/main/res/font"
          mkdir -p "$FONT_DIR"
          BASE_URL="https://github.com/google/fonts/raw/main/ofl/poppins"
          curl -sL "$BASE_URL/Poppins-Regular.ttf"  -o "$FONT_DIR/poppins_regular.ttf"
          curl -sL "$BASE_URL/Poppins-Medium.ttf"   -o "$FONT_DIR/poppins_medium.ttf"
          curl -sL "$BASE_URL/Poppins-SemiBold.ttf" -o "$FONT_DIR/poppins_semibold.ttf"
          curl -sL "$BASE_URL/Poppins-Bold.ttf"     -o "$FONT_DIR/poppins_bold.ttf"
          # Remove XML placeholders (the real TTF files replace them)
          rm -f "$FONT_DIR/poppins_regular.xml" "$FONT_DIR/poppins_medium.xml" \
                "$FONT_DIR/poppins_semibold.xml" "$FONT_DIR/poppins_bold.xml"
          ls -la "$FONT_DIR/"

      - name: 🔧 Grant Gradle permissions
        run: chmod +x gradlew

      - name: 📋 Check Gradle version
        run: gradle --version

      - name: 🔨 Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: IYFCamp2026-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: ℹ️ APK Info
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK généré avec succès !"
            echo "📦 Taille: $(du -h $APK_PATH | cut -f1)"
          else
            echo "❌ APK non trouvé"
            exit 1
          fi

  build-release:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: 🔑 Restore credentials Google Sheets
        run: |
          mkdir -p app/src/main/assets
          echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" | base64 --decode > app/src/main/assets/credentials.json
          echo "✅ credentials.json restauré ($(wc -c < app/src/main/assets/credentials.json) octets)"

      - name: 🔤 Download Poppins fonts
        run: |
          FONT_DIR="app/src/main/res/font"
          mkdir -p "$FONT_DIR"
          BASE_URL="https://github.com/google/fonts/raw/main/ofl/poppins"
          curl -sL "$BASE_URL/Poppins-Regular.ttf"  -o "$FONT_DIR/poppins_regular.ttf"
          curl -sL "$BASE_URL/Poppins-Medium.ttf"   -o "$FONT_DIR/poppins_medium.ttf"
          curl -sL "$BASE_URL/Poppins-SemiBold.ttf" -o "$FONT_DIR/poppins_semibold.ttf"
          curl -sL "$BASE_URL/Poppins-Bold.ttf"     -o "$FONT_DIR/poppins_bold.ttf"
          rm -f "$FONT_DIR/poppins_regular.xml" "$FONT_DIR/poppins_medium.xml" \
                "$FONT_DIR/poppins_semibold.xml" "$FONT_DIR/poppins_bold.xml"

      - name: 🔑 Create Keystore
        run: |
          mkdir -p app/keystore
          keytool -genkey -v \
            -keystore app/keystore/iyf-camp-2026.jks \
            -alias iyf-camp \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass iyf2026camp \
            -keypass iyf2026camp \
            -dname "CN=IYF Camp, OU=IYF, O=International Youth Fellowship, L=Abidjan, ST=CI, C=CI"

      - name: 🔧 Grant Gradle permissions
        run: chmod +x gradlew

      - name: 📦 Build Release APK
        run: gradle assembleRelease --stacktrace

      - name: 📦 Build Release AAB
        run: gradle bundleRelease --stacktrace

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: IYFCamp2026-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: 📤 Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: IYFCamp2026-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
